<template id="tpl-player">
    <h1>Player</h1>


    <div class="panel-row-layout">


        <div class="panel-col-media">
            <img src="../assets/sponge/gif/SpongeFillAndShoot.gif" alt="Fluid Simulation" style="border-radius:12px; border: 3px solid #1a1a1a;">
        </div>


        <div class="panel-col-text">
            <h2 style="margin-top: 0;">Shoot</h2>
            <p>As sponges, we scrub the floor as we move, automatically cleaning it.
                But we can also soak up water from sinks and spit out bubbles to clean the floor and even defeat monsters!</p>
        </div>

    </div>

    <div class="panel-row-layout">



        <div class="panel-col-text">
            <h2 style="margin-top: 0;">Ultimate</h2>
            <p>We also have an ultimate ability that charges by defeating enemies.
                Once ready, it lets us launch a giant bubble that explodes on the ground, cleaning a large area and dealing area-of-effect damage.</p>
        </div>

        <div class="panel-col-media">
            <img src="../assets/sponge/gif/SpongeUltimate.gif" alt="Fluid Simulation" style="border-radius:12px; border: 3px solid #1a1a1a;">
        </div>

    </div>

</template>

<template id="tpl-presentation">
    <h1>Project presentation</h1>


    <div class="panel-row-layout">


        <div class="panel-col-media">
            <video controls style="width: 100%; border-radius: 12px; border: 3px solid #1a1a1a; box-shadow: 4px 4px 0px #1a1a1a; display: block;">
                <source src="../assets/sponge/video/SpongeVideo.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la lecture de vidéos.
            </video>
        </div>


        <div class="panel-col-text">
            <h2 style="margin-top: 0;">"Coeur de ville en lumière" Montpellier</h2>
            <p>Sponge was a project commissioned by the city of Montpellier for their annual event “Cœur de Ville en Lumière.” The goal was to create a 2-player game lasting 3 minutes, projected onto the wall of the Agora amphitheater in Montpellier.
                <br>
                <br>
                Players control sponges that must clean the wall while fighting off monsters that keep trying to make it dirty again. The objective is to score as many points as possible for the leaderboard.
                <br>
                <br>
                It was a side project developed alongside our final year project.
            </p>
        </div>

    </div>

</template>

<template id="tpl-Optimization">
    <h1>Optimization</h1>


    <div class="panel-row-layout">


        <div class="panel-col-media">
            <img src="../assets/sponge/image/ScaledRTV.png" alt="Fluid Simulation" style="border-radius:12px; border: 3px solid #1a1a1a;">
        </div>


        <div class="panel-col-text">
            <h2 style="margin-top: 0;">What we have did ?</h2>
            <p>Points are earned by having the cleanest surface area on the wall.
                To determine this, we analyze the RVT texture and calculate the percentage of visible dirt — pixel by pixel, for accuracy.
                However, this method is quite heavy in terms of performance.
                <br>
                <br>
                To optimize, we use a smaller texture that mirrors the RVT, allowing for much lighter calculations and preventing lag on the hardware provided for the event.
                <br>
                <br>
                Instead of checking 1 048 576 pixels on a 1024x1024 texture for high in-game quality, we only check 4 096 pixels using a dedicated 64x64 texture for calculations.
                This saves 1920 pixels from being processed. While it slightly reduces precision, the performance gain makes it well worth it.
            </p>
        </div>

    </div>

</template>
