<template id="tpl-aboutme">
    <h1>About me</h1>

    <p>My name is <strong>Timothée Fontan</strong>, and I am 23 years old. I have been passionate about video game since I was 7 years old, thaks to my grandma who play with me at<strong> Sonic the Hedgehog 2 on Master System II.</strong></p>
    <p>I learn about game creation with scratch in middle school and from that moment, I knew I wanted to make this passion my job. I learned programming in high school, and then I went to<strong> ESMA Game</strong> in Montpellier to learn how realy create video games and make my dream a reality.</p>
    <p>Now I am a<strong> freelance game developer and project manager</strong> in the video game industry, and I am also a<strong> teacher at game development school</strong>, helping student like I once was become part of this industry.</p>

    <h2> Link : </h2>
    <a href="https://kancabricot.itch.io/" class="contact-item">Itch.io</a>
   </template>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        // Initialisation de ton moteur de bulles
        if (typeof BubbleEngine !== 'undefined') {
            new BubbleEngine();
        }

        // --- FORCE L'OUVERTURE D'UN PANEL AU CHARGEMENT ---
        if (window.BubbleGlobals && window.BubbleGlobals.panelManager) {
            window.BubbleGlobals.panelManager.open({
                template: 'tpl-aboutme' // Mets ici l'ID du <template> que tu veux ouvrir par défaut
            });
        }
    });
</script>
